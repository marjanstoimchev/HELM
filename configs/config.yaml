defaults:
  - dataset: ucm
  - method: hmlc-ssl-graph-byol
  - training: default
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

model:
  pretrained: true

processing:
  num_workers: 16

data:
  cache_dir: ./Datasets/mlc_datasets_npy

experiment:
  seeds: [0, 1, 42]
  fractions: [0.01, 0.05, 0.1, 0.25]
  output_dir: results
  save_model_dir: saved_models

trainer:
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  devices: [0, 1, 2, 3]
  precision: "16-mixed"
  sync_batchnorm: true
